# fix smashed status item identifiers (from dotted paths where dots aren't split characters)

# account list status items
"^(.*)Accountlistcaldav(.*)$":
  repl: "${1}AccountListCalDAV${2}"
  types:
    - "field"
    - "struct"
"^(.*)Accountlistcarddav(.*)$":
  repl: "${1}AccountListCardDAV${2}"
  types:
    - "field"
    - "struct"
"^(.*)Accountlistexchange(.*)$":
  repl: "${1}AccountListExchange${2}"
  types:
    - "field"
    - "struct"
"^(.*)Accountlistgoogle(.*)$":
  repl: "${1}AccountListGoogle${2}"
  types:
    - "field"
    - "struct"
"^(.*)Accountlistldap(.*)$":
  repl: "${1}AccountListLDAP${2}"
  types:
    - "field"
    - "struct"
"^(.*)Accountlistmailincoming(.*)$":
  repl: "${1}AccountListMailIncoming${2}"
  types:
    - "field"
    - "struct"
"^(.*)Accountlistmailoutgoing(.*)$":
  repl: "${1}AccountListMailOutgoing${2}"
  types:
    - "field"
    - "struct"
"^(.*)AccountlistsubscribedCalendar(.*)$":
  repl: "${1}AccountListSubscribedCalendar${2}"
  types:
    - "field"
    - "struct"

